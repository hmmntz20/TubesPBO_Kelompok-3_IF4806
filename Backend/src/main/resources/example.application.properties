# ==============================================================================
# APLIKASI BACKEND - CONFIGURATION TEMPLATE
# ==============================================================================
# Instruksi: 
# 1. Copy file ini menjadi 'application.properties'
# 2. Isi nilai yang kosong di bawah ini dengan data asli Anda
# ==============================================================================

spring.application.name=backend

# 1. DATABASE SUPABASE CONFIGURATION
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 2. GMAIL SMTP CONFIGURATION
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
# (untuk password gunakan Google App Password dari https://myaccount.google.com/u/1/apppasswords)
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true