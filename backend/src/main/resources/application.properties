# ──────────────────────────────────────────────────────────────────────────
# Telkom Route Finder — backend default config (profil: tidak ditentukan / dev)
#
# Properti ini berlaku untuk dev lokal. Override per-environment:
#   - test  → application-test.properties (H2 in-memory, dipakai @ActiveProfiles("test"))
#   - prod  → application-prod.properties (override produksi)
#
# Kredensial DB & JWT TIDAK boleh di-hardcode → semua dibaca dari env var.
# Contoh cara isi nilai (Linux/macOS, di shell yang menjalankan backend):
#   export DB_HOST=db.<project-ref>.supabase.co
#   export DB_PORT=5432
#   export DB_NAME=postgres
#   export DB_USER=postgres
#   export DB_PASSWORD=<password Supabase Anda>
#   export SUPABASE_JWT_SECRET=<JWT secret dari Project Settings → API>
# Lalu `./mvnw spring-boot:run`.
#
# Untuk dev tanpa Supabase (hanya mau test endpoint non-auth lokal):
#   biarkan default — Postgres lokal di localhost:5432/telkomroute akan dipakai.
# ──────────────────────────────────────────────────────────────────────────

spring.application.name=backend
server.port=8080

# ── PostgreSQL (Supabase di prod, Postgres lokal di dev) ──
# Default value setelah ':' hanya untuk kenyamanan dev lokal.
# Di mesin developer pertama kali, set env: DB_HOST, DB_NAME, DB_USER, DB_PASSWORD.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telkomroute}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ── Supabase Auth ──
# JWT secret dipakai oleh SupabaseJwtFilter untuk memvalidasi tanda-tangan
# token user yang diterima dari header Authorization. Bukan anon key (anon
# key di-bundle ke frontend, sengaja publik). JWT secret WAJIB rahasia.
# Ambil di Supabase dashboard → Project Settings → API → "JWT Secret".
app.supabase.jwt-secret=${SUPABASE_JWT_SECRET:}
# Project ref dipakai untuk validasi claim 'iss' agar token dari proyek
# Supabase yang berbeda ditolak.
app.supabase.project-ref=${SUPABASE_PROJECT_REF:}

# ── Aplikasi ──
app.cors.allowed-origins=http://localhost:8081,http://localhost:19006,http://localhost:19000
app.geojson.classpath=telmap.geojson

# ── Logging ──
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO
