# ──────────────────────────────────────────────────────────────────────────
# Telkom Route Finder — backend test config (profil: test)
#
# Diaktifkan otomatis pada test via @ActiveProfiles("test").
# Memakai H2 in-memory dengan kompatibilitas mode PostgreSQL agar SQL
# pemrograman A* nanti tidak harus berbeda antara dev dan test.
# ──────────────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:telkomroute-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# CORS bebas saat test (origin tidak dipakai)
app.cors.allowed-origins=http://localhost

# Supabase JWT secret untuk test — fixed value (>=32 byte) agar test
# dapat menandatangani token uji coba dengan key yang sama. Bukan secret
# nyata; hanya berlaku di test classpath.
app.supabase.jwt-secret=test-supabase-jwt-secret-256bit-minimum-length-required-by-jjwt
app.supabase.project-ref=test-project
